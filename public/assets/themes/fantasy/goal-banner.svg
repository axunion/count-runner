<svg xmlns="http://www.w3.org/2000/svg" width="720" height="160" viewBox="0 0 720 160">
  <!-- SANCTUM gate: golden threshold drawn across the goal line -->
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#fde68a"/>
      <stop offset="0.85" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- side pillars -->
  <g fill="#b45309">
    <rect x="28" y="30" width="26" height="120" rx="4"/>
    <rect x="666" y="30" width="26" height="120" rx="4"/>
  </g>
  <g fill="#fbbf24">
    <rect x="24" y="20" width="34" height="14" rx="4"/>
    <rect x="662" y="20" width="34" height="14" rx="4"/>
    <rect x="33" y="40" width="4" height="100" opacity="0.6"/>
    <rect x="683" y="40" width="4" height="100" opacity="0.6"/>
  </g>

  <!-- glowing threshold beam on the banner center line -->
  <rect x="0" y="74" width="720" height="12" fill="url(#beam)"/>
  <rect x="0" y="78" width="720" height="4" fill="#fefce8" opacity="0.8"/>

  <!-- SANCTUM lettering -->
  <text x="360" y="52" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" letter-spacing="14" fill="#fbbf24" font-weight="bold">SANCTUM</text>
  <text x="360" y="52" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" letter-spacing="14" fill="#fef3c7" font-weight="bold" opacity="0.35" transform="translate(0 -2)">SANCTUM</text>

  <!-- rising light motes -->
  <g fill="#fde68a">
    <circle cx="180" cy="110" r="3" opacity="0.7"/>
    <circle cx="290" cy="125" r="2.2" opacity="0.55"/>
    <circle cx="430" cy="118" r="2.6" opacity="0.6"/>
    <circle cx="545" cy="128" r="2" opacity="0.5"/>
  </g>
</svg>
